services:
  postgres:
    image: postgres:14.2
    container_name: tibiaeye-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-tibia_telemetry}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tibiaeye-network

  redis:
    image: redis:7-alpine
    container_name: tibiaeye-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tibiaeye-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: tibiaeye-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_NAME: ${DATABASE_NAME:-tibia_telemetry}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tibiaeye-network

  app:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: tibiaeye-app
    ports:
      - "3001:3001"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - tibiaeye-network

  backoffice:
    build:
      context: .
      dockerfile: apps/backoffice/Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: tibiaeye-backoffice
    ports:
      - "3002:3002"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - tibiaeye-network

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
    container_name: tibiaeye-landing
    ports:
      - "3003:3003"
    restart: unless-stopped
    networks:
      - tibiaeye-network

volumes:
  postgres_data:
  redis_data:

networks:
  tibiaeye-network:
    driver: bridge
